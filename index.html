<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Inventory System</h2>

  <div class="form">
    <input id="name" placeholder="Nama Barang">
    <input id="qty" type="number" placeholder="Jumlah">
    <button onclick="addItem()">Tambah</button>
  </div>

  <input id="search" placeholder="Cari barang..." onkeyup="render()" />

  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>Jumlah</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script src="script.js"></script>

</body>
</html>
